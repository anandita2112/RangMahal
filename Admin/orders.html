<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders — Rang Mahal Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="admin.css" />
  <style>
    .filter-tabs { display: flex; gap: 6px; }
    .filter-tab {
      padding: 7px 14px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--text-3);
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all var(--t);
    }
    .filter-tab:hover { border-color: var(--orange); color: var(--orange); }
    .filter-tab.active { background: var(--orange); color: #fff; border-color: var(--orange); }
    .status-select {
      padding: 5px 8px; border-radius: 4px; border: 1px solid var(--border);
      font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text-2);
      background: var(--cream); cursor: pointer; outline: none;
    }
    .order-id { font-weight: 600; color: var(--brown); }
    .order-amount { font-weight: 600; color: var(--orange); }
  </style>
</head>
<body>

<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand"><img src="../assets/images/logo.png" alt="Rang Mahal" /><div class="sidebar-brand-text"><h2>Rang Mahal</h2><span>Admin</span></div></div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="dashboard.html"><i class="fas fa-th-large"></i> Dashboard</a>
    <a class="nav-item active" href="orders.html"><i class="fas fa-box"></i> Orders</a>
    <a class="nav-item" href="products.html"><i class="fas fa-tags"></i> Products</a>
    <a class="nav-item" href="customers.html"><i class="fas fa-users"></i> Customers</a>
    <a class="nav-item" href="settings.html"><i class="fas fa-cog"></i> Settings</a>
    <div class="nav-spacer"></div>
  </nav>
  <div class="sidebar-footer"><a class="nav-item logout" href="login.html"><i class="fas fa-right-from-bracket"></i> Log Out</a></div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
      <span class="topbar-title">Orders</span>
    </div>
    <div class="topbar-right">
      <a href="../index.html" class="topbar-link"><i class="fas fa-external-link-alt"></i> View Store</a>
      <div class="topbar-user"><div class="avatar">A</div><span>Admin</span></div>
    </div>
  </header>

  <div class="content">

    <!-- Stats row -->
    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);">
      <div class="stat-card" id="statAll">
        <div class="stat-number" id="sAll">0</div>
        <div class="stat-label">Total Orders</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="color:var(--green);" id="sConf">0</div>
        <div class="stat-label">Confirmed</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="color:#2A5AB0;" id="sShip">0</div>
        <div class="stat-label">Shipped</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" style="color:var(--orange);" id="sRev">₹0</div>
        <div class="stat-label">Revenue</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <span class="panel-title">All Orders</span>
        <div class="filter-tabs" id="filterTabs">
          <button class="filter-tab active" onclick="filterOrders('all',this)">All</button>
          <button class="filter-tab" onclick="filterOrders('confirmed',this)">Confirmed</button>
          <button class="filter-tab" onclick="filterOrders('processing',this)">Processing</button>
          <button class="filter-tab" onclick="filterOrders('shipped',this)">Shipped</button>
          <button class="filter-tab" onclick="filterOrders('delivered',this)">Delivered</button>
        </div>
      </div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Product</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Date</th>
              <th>Update</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <div class="empty" id="empty" style="display:none;">
        <i class="fas fa-box"></i>
        <h3>No orders found</h3>
        <p>Orders will appear here when customers place them.</p>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg"></span></div>

<script src="admin-data.js"></script>
<script>
  let currentFilter = 'all';

  function updateStats() {
    const orders = DB.orders();
    document.getElementById('sAll').textContent = orders.length;
    document.getElementById('sConf').textContent = orders.filter(o => o.status === 'confirmed').length;
    document.getElementById('sShip').textContent = orders.filter(o => o.status === 'shipped').length;
    document.getElementById('sRev').textContent = formatPrice(orders.reduce((s,o) => s + o.amount, 0));
  }

  function renderOrders() {
    const orders = DB.orders();
    const filtered = currentFilter === 'all' ? orders : orders.filter(o => o.status === currentFilter);
    const tbody = document.getElementById('tbody');
    const empty = document.getElementById('empty');

    if (!filtered.length) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    tbody.innerHTML = filtered.map(o => `
      <tr>
        <td class="order-id">#${o.id}</td>
        <td>
          <div class="customer-cell">
            <div class="customer-avatar">${o.initials}</div>
            ${o.customer}
          </div>
        </td>
        <td>${o.product}</td>
        <td class="order-amount">${formatPrice(o.amount)}</td>
        <td><span class="status ${o.status}"><span class="status-dot"></span>${o.status.charAt(0).toUpperCase() + o.status.slice(1)}</span></td>
        <td>${o.date}</td>
        <td>
          <select class="status-select" onchange="updateStatus('${o.id}', this.value)">
            <option value="confirmed"  ${o.status==='confirmed'?'selected':''}>Confirmed</option>
            <option value="processing" ${o.status==='processing'?'selected':''}>Processing</option>
            <option value="shipped"    ${o.status==='shipped'?'selected':''}>Shipped</option>
            <option value="delivered"  ${o.status==='delivered'?'selected':''}>Delivered</option>
            <option value="cancelled"  ${o.status==='cancelled'?'selected':''}>Cancelled</option>
          </select>
        </td>
      </tr>
    `).join('');

    updateStats();
  }

  function updateStatus(id, newStatus) {
    const orders = DB.orders();
    const order = orders.find(o => o.id === id);
    if (order) {
      order.status = newStatus;
      DB.saveOrders(orders);
      renderOrders();
      showToast('Order #' + id + ' updated to ' + newStatus);
    }
  }

  function filterOrders(status, btn) {
    currentFilter = status;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  renderOrders();
</script>
</body>
</html>
