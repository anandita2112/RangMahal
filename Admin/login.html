<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Rang Mahal</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:   #FBF8F3;
      --cream-2: #F0E8D8;
      --white:   #FFFFFF;
      --brown:   #3C1E0C;
      --brown-2: #7A4A2A;
      --orange:  #C4521A;
      --gold:    #BE8820;
      --border:  #E2D0B8;
      --text:    #3C1E0C;
      --text-2:  #7A4A2A;
      --text-3:  #A07850;
      --t:       0.25s ease;
    }

    html { height: 100%; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100%;
      display: flex; flex-direction: column;
    }

    /* ── Layout: left panel + right panel ── */
    .login-page {
      flex: 1; display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    /* ── Left: Brand panel ── */
    .brand-panel {
      background: var(--brown);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 48px;
      position: relative; overflow: hidden;
    }
    .brand-panel::before {
      content: '';
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(251,248,243,0.06) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }
    .brand-content { position: relative; z-index: 1; text-align: center; }
    .brand-logo {
      height: 140px; width: auto;
      filter: brightness(0) invert(1);
      margin-bottom: 32px;
    }
    .brand-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px; font-weight: 700;
      color: var(--cream); line-height: 1.1;
      margin-bottom: 14px;
    }
    .brand-subtitle {
      font-size: 14px; color: rgba(251,248,243,0.55);
      letter-spacing: 0.5px; line-height: 1.7;
      max-width: 320px;
    }
    .brand-divider {
      width: 40px; height: 1.5px;
      background: var(--gold);
      margin: 20px auto 22px;
    }
    .brand-tagline {
      font-size: 12px; color: var(--gold);
      letter-spacing: 2px; text-transform: uppercase; font-weight: 600;
    }

    /* ── Right: Login form ── */
    .form-panel {
      display: flex; align-items: center; justify-content: center;
      padding: 48px;
      background: var(--cream);
    }
    .form-container {
      width: 100%; max-width: 400px;
    }

    .form-header {
      margin-bottom: 36px;
    }
    .form-header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px; font-weight: 700;
      color: var(--brown); margin-bottom: 8px;
    }
    .form-header p {
      font-size: 14px; color: var(--text-3);
    }

    /* Fields */
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 11.5px; font-weight: 600;
      letter-spacing: 0.8px; text-transform: uppercase;
      color: var(--text-2); margin-bottom: 8px;
    }
    .input-wrap {
      display: flex; align-items: center;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 6px; overflow: hidden;
      transition: border-color var(--t);
    }
    .input-wrap:focus-within { border-color: var(--orange); }
    .input-wrap i {
      padding: 0 14px;
      color: var(--text-3); font-size: 14px; flex-shrink: 0;
    }
    .input-wrap input {
      flex: 1; border: none; background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; color: var(--text);
      padding: 13px 14px 13px 0; outline: none;
    }
    .input-wrap input::placeholder { color: var(--text-3); }

    .toggle-pw {
      background: none; border: none; cursor: pointer;
      color: var(--text-3); font-size: 14px;
      padding: 0 14px; transition: color var(--t);
    }
    .toggle-pw:hover { color: var(--orange); }

    /* Remember + forgot */
    .form-options {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .remember {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; color: var(--text-2); cursor: pointer;
    }
    .remember input { accent-color: var(--orange); width: 15px; height: 15px; }
    .forgot {
      font-size: 13px; color: var(--orange);
      text-decoration: none; font-weight: 500;
      transition: color var(--t);
    }
    .forgot:hover { color: var(--brown); }

    /* Submit */
    .btn-login {
      width: 100%; padding: 14px;
      background: var(--brown); color: var(--cream);
      border: none; border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; transition: background var(--t);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { background: var(--orange); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Error msg */
    .error-msg {
      display: none;
      align-items: center; gap: 8px;
      background: #fdf0ef; border: 1px solid #e8c4c0;
      border-radius: 6px; padding: 12px 14px;
      font-size: 13px; color: #9A2020;
      margin-bottom: 20px;
    }
    .error-msg.show { display: flex; }
    .error-msg i { flex-shrink: 0; }

    /* Footer note */
    .form-footer {
      text-align: center; margin-top: 32px;
      font-size: 12px; color: var(--text-3);
    }
    .form-footer a { color: var(--orange); text-decoration: none; }
    .form-footer a:hover { color: var(--brown); }

    .secure-badge {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      font-size: 11px; color: var(--text-3);
      margin-top: 28px;
    }
    .secure-badge i { color: var(--gold); }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .login-page { grid-template-columns: 1fr; }
      .brand-panel { display: none; }
      .form-panel { padding: 32px 24px; }
    }

    @media (max-width: 900px) {
      .form-container { max-width: 100%; }
      .mobile-brand {
        display: flex; flex-direction: column; align-items: center;
        margin-bottom: 28px;
      }
      .mobile-brand img {
        height: 80px; width: auto; margin-bottom: 8px;
      }
      .mobile-brand span {
        font-size: 10px; color: var(--text-3);
        letter-spacing: 1.5px; text-transform: uppercase;
      }
    }
    @media (min-width: 901px) {
      .mobile-brand { display: none; }
    }
  </style>
</head>
<body>

<div class="login-page">

  <!-- ── Left: Brand panel ── -->
  <div class="brand-panel">
    <div class="brand-content">
      <img src="../assets/images/logo.png" alt="Rang Mahal" class="brand-logo" />
      <div class="brand-title">Admin Panel</div>
      <p class="brand-subtitle">
        Manage your products, orders, and customers from one place.
      </p>
      <div class="brand-divider"></div>
      <div class="brand-tagline">Rang Mahal · Jaipur</div>
    </div>
  </div>

  <!-- ── Right: Login form ── -->
  <div class="form-panel">
    <div class="form-container">

      <!-- Mobile logo (visible only on mobile) -->
      <div class="mobile-brand">
        <img src="../assets/images/logo.png" alt="Rang Mahal" />
        <span>Admin Panel</span>
      </div>

      <div class="form-header">
        <h1>Welcome back</h1>
        <p>Sign in to your admin dashboard</p>
      </div>

      <!-- Error -->
      <div class="error-msg" id="errorMsg">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText">Invalid email or password. Please try again.</span>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">

        <div class="field">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" placeholder="admin@rangmahal.in" required autocomplete="email" />
          </div>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password" />
            <button type="button" class="toggle-pw" onclick="togglePassword()">
              <i class="fas fa-eye" id="pwIcon"></i>
            </button>
          </div>
        </div>

        <div class="form-options">
          <label class="remember">
            <input type="checkbox" checked /> Remember me
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <i class="fas fa-right-to-bracket"></i> Sign In
        </button>

      </form>

      <div class="secure-badge">
        <i class="fas fa-lock"></i> Secured with SSL encryption
      </div>

      <div class="form-footer">
        <a href="../index.html">← Back to Rang Mahal website</a>
      </div>

    </div>
  </div>

</div>

<script>
  function togglePassword() {
    const pw = document.getElementById('password');
    const icon = document.getElementById('pwIcon');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
      pw.type = 'password';
      icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
  }

  function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';

    setTimeout(() => {
      if (email === 'admin@rangmahal.in' && password === 'admin123') {
        btn.innerHTML = '<i class="fas fa-check"></i> Success!';
        btn.style.background = '#2D8A40';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
      } else {
        document.getElementById('errorMsg').classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-right-to-bracket"></i> Sign In';
      }
    }, 1200);
  }
</script>
</body>
</html>
